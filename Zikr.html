<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suivi des Zikrs - Magal 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #fcf9f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .arabic-text {
            font-family: 'Amiri', serif;
            line-height: 1.8;
        }
        .zikr-card {
            background: #ffffff;
            border: 2px solid #dfc49a;
            box-shadow: 0 4px 15px rgba(139, 92, 26, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .zikr-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(139, 92, 26, 0.12);
            border-color: #b8860b;
        }
        /* Style pour la barre de défilement des textes longs */
        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #dfc49a;
            border-radius: 10px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <header class="bg-gradient-to-r from-amber-950 via-amber-900 to-amber-950 text-white py-8 shadow-xl text-center px-4 relative border-b-4 border-amber-600">
        <div class="absolute inset-0 opacity-5 bg-[radial-gradient(#fff_1px,transparent_1px)] [background-size:16px_16px]"></div>
        <h1 class="text-3xl md:text-5xl font-extrabold tracking-widest text-amber-100 uppercase">COMPTEUR DE ZIKR</h1>
        <p class="text-amber-300/90 mt-2 text-sm md:text-lg font-light tracking-wide">Magal Touba à Orléans • Journée de Recueillement</p>
        
        <button onclick="ouvrirAjouterZikr()" class="mt-5 bg-emerald-700 hover:bg-emerald-600 active:scale-95 text-white font-bold py-2.5 px-6 rounded-full text-xs md:text-sm shadow-lg transition-all border border-emerald-500 tracking-wider">
            <i class="fas fa-plus me-2"></i> AJOUTER UN ZIKR
        </button>
    </header>

    <main class="container mx-auto px-4 py-10 flex-grow max-w-7xl">
        <div id="zikr-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <footer class="bg-amber-950 text-amber-300/70 text-center py-5 text-xs md:text-sm border-t border-amber-900 font-medium tracking-wide">
        <p>Jëreëjëfaty Bōrom Touba • © Daara Touba Orléans 2026</p>
    </footer>

    <div id="modal-ajout" class="fixed inset-0 bg-black/60 hidden items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-white rounded-2xl max-w-lg w-full p-6 shadow-2xl border-2 border-amber-600 animate-fade-in">
            <h3 class="text-2xl font-bold text-amber-950 mb-4 border-b pb-2 flex items-center">
                <i class="fas fa-beads me-2 text-amber-700"></i> Nouveau Zikr
            </h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Nom du Zikr (en français)</label>
                    <input type="text" id="nouveau-nom" class="w-full border-2 border-gray-200 rounded-xl p-3 focus:border-amber-700 outline-none transition-all" placeholder="Ex: Salatoul Fatiha">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Texte complet (Arabe vocalisé ou Français)</label>
                    <textarea id="nouveau-texte" class="w-full border-2 border-gray-200 rounded-xl p-3 focus:border-amber-700 outline-none h-32 custom-scroll transition-all" placeholder="Collez le texte sacré ici..."></textarea>
                </div>
            </div>
            <div class="flex justify-end space-x-3 mt-6">
                <button onclick="fermerAjouterZikr()" class="px-4 py-2 text-gray-500 hover:text-gray-800 font-semibold transition-all">Annuler</button>
                <button onclick="confirmerAjouterZikr()" class="px-6 py-2 bg-emerald-700 hover:bg-emerald-600 text-white font-bold rounded-xl shadow-md transition-all">Créer le compteur</button>
            </div>
        </div>
    </div>

    <script>
        // Configuration initiale avec textes intégraux exacts et arabe entièrement vocalisé
        const zikrsParDefaut = [
            { 
                id: 1, 
                nom: "La ilaha illa Allah", 
                texte: "<span class='arabic-text text-3xl font-bold text-emerald-800 block text-center mb-2' dir='rtl'>لَا إِلَٰهَ إِلَّا اللَّهُ</span>", 
                compteur: 0 
            },
            { 
                id: 2, 
                nom: "Astaghfiroullah", 
                texte: "<span class='arabic-text text-3xl font-bold text-emerald-800 block text-center mb-2' dir='rtl'>أَسْتَغْفِرُ اللَّهَ</span>", 
                compteur: 0 
            },
            { 
                id: 3, 
                nom: "Çallal lahou ala Mouhammad", 
                texte: "<span class='arabic-text text-3xl font-bold text-emerald-800 block text-center mb-2' dir='rtl'>صَلَّى اللَّهُ عَلَىٰ مُحَمَّدٍ</span><span class='block text-xs text-center text-gray-500 mt-1'>(« Que la paix et la bénédiction d'Allah soient sur Mouhammad »)</span>", 
                compteur: 0 
            },
            { 
                id: 4, 
                nom: "Salatoul Fatiha", 
                texte: "<span class='arabic-text text-2xl font-bold text-amber-900 block text-center mb-3 leading-relaxed' dir='rtl'>بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ<br>اللَّهُمَّ صَلِّ عَلَىٰ سَيِّدِنَا مُحَمَّدٍ الْفَاتِحِ لِمَا أُغْلِقَ وَالْخَاتِمِ لِمَا سَبَقَ نَاصِرِ الْحَقِّ بِالْحَقِّ وَالْهَادِي إِلَىٰ صِرَاطِكَ الْمُسْتَقِيمِ وَعَلَىٰ آلِهِ حَقَّ قَدْرِهِ وَمِقْدَارِهِ الْعَظِيمِ</span><hr class='my-2 border-amber-100'><p class='text-xs text-gray-600 leading-relaxed text-left font-medium italic'>Bismillahirahmanirahim. Allahumma salli ala sayyidina Muhammadin al fatihi lima ughliq wal khatimi lima sabaq nasil haq bil haq wal hadi ila shiratikal mustaqim wa ala alihi haq qadri wa miqdarihi azim.</p>", 
                compteur: 0 
            },
            { 
                id: 5, 
                nom: "Salatoul Oumiyi", 
                texte: "<span class='arabic-text text-2xl font-bold text-amber-900 block text-center mb-3 leading-relaxed' dir='rtl'>اللَّهُمَّ صَلِّ عَلَىٰ سَيِّدِنَا مُحَمَّدٍ النَّبِيِّ الْأُمِّيِّ وَعَلَىٰ آلِهِ وَصَحْبِهِ وَسَلِّمْ تَسْلِيمًا</span><hr class='my-2 border-amber-100'><p class='text-xs text-gray-600 leading-relaxed text-left font-medium italic'>Allahumma salli ala sayyidina Muhammad nabi ummi wa ala alihi wa sahbihi wa sallim taslima.</p>", 
                compteur: 0 
            }
        ];

        let zikrs = JSON.parse(localStorage.getItem('mes_zikrs_v3'));
        
        if (!zikrs || zikrs.length < 5) {
            zikrs = zikrsParDefaut;
            localStorage.setItem('mes_zikrs_v3', JSON.stringify(zikrs));
        }

        function sauvegarder() {
            localStorage.setItem('mes_zikrs_v3', JSON.stringify(zikrs));
            afficherZikrs();
        }

        function afficherZikrs() {
            const container = document.getElementById('zikr-container');
            container.innerHTML = '';

            zikrs.forEach(zikr => {
                const card = document.createElement('div');
                card.className = "zikr-card rounded-2xl p-6 flex flex-col justify-between items-center relative overflow-hidden";
                card.innerHTML = `
                    <div class="w-full">
                        <button onclick="supprimerZikr(${zikr.id})" class="absolute top-3 right-3 text-amber-300 hover:text-red-600 transition-all text-sm p-1">
                            <i class="fas fa-trash"></i>
                        </button>
                        
                        <h2 class="text-xl font-bold text-amber-950 text-center mb-4 border-b border-amber-100 pb-2 tracking-wide uppercase text-sm">${zikr.nom}</h2>
                        
                        <div class="bg-gradient-to-b from-amber-50/40 to-amber-50/10 p-4 rounded-xl border border-amber-100/70 custom-scroll max-h-56 overflow-y-auto shadow-inner">
                            ${zikr.texte}
                        </div>
                    </div>

                    <div class="my-6 bg-amber-950/5 px-6 py-2 rounded-2xl border border-amber-950/10 w-full text-center">
                        <span class="text-5xl md:text-6xl font-black text-amber-950 tracking-widest">${zikr.compteur.toLocaleString()}</span>
                    </div>

                    <div class="flex items-center space-x-4 w-full justify-center">
                        <button onclick="decrementer(${zikr.id})" class="w-12 h-12 bg-amber-100/80 hover:bg-amber-200 text-amber-900 rounded-xl flex items-center justify-center font-bold text-sm shadow-sm transition-all border border-amber-200" title="Enlever 1">
                            -1
                        </button>
                        <button onclick="incrementer(${zikr.id})" class="flex-grow h-14 bg-emerald-700 hover:bg-emerald-600 active:scale-95 text-white rounded-xl flex items-center justify-center font-black text-xl shadow-md transition-all border-b-4 border-emerald-900 tracking-wider">
                            + 1
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function incrementer(id) {
            const zikr = zikrs.find(z => z.id === id);
            if (zikr) {
                zikr.compteur += 1;
                sauvegarder();
            }
        }

        function decrementer(id) {
            const zikr = zikrs.find(z => z.id === id);
            if (zikr && zikr.compteur > 0) {
                zikr.compteur -= 1;
                sauvegarder();
            }
        }

        function ouvrirAjouterZikr() {
            document.getElementById('modal-ajout').style.display = 'flex';
        }

        function fermerAjouterZikr() {
            document.getElementById('modal-ajout').style.display = 'none';
            document.getElementById('nouveau-nom').value = '';
            document.getElementById('nouveau-texte').value = '';
        }

        function confirmerAjouterZikr() {
            const nom = document.getElementById('nouveau-nom').value.trim();
            const texteSaisi = document.getElementById('nouveau-texte').value.trim();

            if (!nom) {
                alert("Veuillez donner un nom au Zikr.");
                return;
            }

            // On formate automatiquement le texte ajouté pour garder un joli style arabe ou français
            const texteFormate = `<span class='arabic-text text-2xl font-bold text-amber-900 block text-center' dir='rtl'>${texteSaisi.replace(/\n/g, '<br>')}</span>`;

            const nouveauZikr = {
                id: Date.now(),
                nom: nom,
                texte: texteFormate || "Pas de description",
                compteur: 0
            };

            zikrs.push(nouveauZikr);
            sauvegarder();
            fermerAjouterZikr();
        }

        function supprimerZikr(id) {
            if (confirm("Voulez-vous vraiment retirer ce zikr de l'affichage ?")) {
                zikrs = zikrs.filter(z => z.id !== id);
                sauvegarder();
            }
        }

        afficherZikrs();
    </script>
</body>
</html>
